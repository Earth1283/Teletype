# ── Web server ───────────────────────────────────────────────────────────────
server:
  # Port the embedded HTTP server listens on.
  # When TLS is enabled this port serves only as an HTTP→HTTPS redirect.
  port: 8080

  # HTTPS port (only used when tls.enabled: true).
  https-port: 8443

  # Allowed CORS origins. Empty = allow all (fine for local use).
  # Example: ["https://panel.example.com", "http://localhost:3000"]
  cors-origins: []

  # Cap on simultaneous authenticated WebSocket connections.
  max-websocket-connections: 8

  # Trust HTTPS/client IP headers from a reverse proxy or hosting panel.
  # Enable only when Teletype is reachable through that proxy and direct access
  # to the Teletype port is blocked; otherwise clients can spoof these headers.
  # Supports Forwarded and X-Forwarded-* headers, including X-Forwarded-Proto.
  trust-proxy-headers: false

  # ┌─ PORT SHARING (multiplex-game-port) ────────────────────────────────────┐
  # │ Normally your server needs TWO open ports:                              │
  # │   25565 — Minecraft players connect here                                │
  # │   8080  — Teletype web panel                                            │
  # │                                                                         │
  # │ Set this to true to share ONE port for both. Players and browsers both  │
  # │ connect to multiplex-port (default 25565). Teletype figures out which   │
  # │ connection is which automatically.                                       │
  # │                                                                         │
  # │ HOW TO ENABLE (3 steps):                                                │
  # │   1. Set multiplex-game-port below to: true                             │
  # │   2. Restart the server. The plugin will automatically move Minecraft   │
  # │      to an internal port and print a message in console — this is fine. │
  # │   3. Restart the server ONE MORE TIME. Done.                            │
  # │      Players still connect to 25565. No firewall changes needed.        │
  # │                                                                         │
  # │ TROUBLESHOOTING — players can't connect after enabling:                 │
  # │   • Did you restart TWICE? One restart is not enough (see step 2-3).   │
  # │   • Check console for "[Teletype] Port multiplexer on :25565" — if     │
  # │     that line is missing the multiplexer didn't start; restart again.  │
  # │   • Make sure multiplex-port (below) matches what players connect to.  │
  # └─────────────────────────────────────────────────────────────────────────┘
  multiplex-game-port: false

  # The port everyone connects to when multiplex-game-port is enabled.
  # Leave this at 25565 unless your server runs on a different port.
  # (Only used when multiplex-game-port is true.)
  multiplex-port: 25565

  # Forward real Minecraft client IPs through the Teletype multiplexer using
  # HAProxy PROXY protocol v1.
  #
  # BEFORE setting this to true, edit Paper's config/paper-global.yml:
  #   proxies:
  #     proxy-protocol: true
  #
  # If Paper's proxy-protocol support is not enabled first, players will fail
  # to join because Paper will read the PROXY header as invalid Minecraft data.
  forward-minecraft-player-addresses: false

  tls:
    # Enable HTTPS. A self-signed certificate is generated automatically on first
    # start (stored in plugins/Teletype/keystore.jks). Browsers will show a
    # security warning for self-signed certs — accept it once or supply a real cert.
    enabled: false

    # Certificate source:
    #   auto      — generate and reuse a self-signed certificate (default)
    #   keystore  — load from an existing JKS / PKCS12 file
    mode: auto

    # Path to keystore file (mode: keystore only).
    # Relative paths resolve from the Teletype plugin data folder.
    keystore-path: ""

    # Passwords for the keystore and private key (mode: keystore only).
    # The auto-generated self-signed cert uses "teletype-tls" internally.
    keystore-password: ""
    key-password: ""

    # Alias of the key entry inside the keystore.
    key-alias: "teletype"

    # Redirect plain HTTP requests to HTTPS (recommended).
    http-redirect: true

# ── Rate limiting ─────────────────────────────────────────────────────────────
rate-limit:
  # Master switch. Set false to disable all rate limiting.
  enabled: true

  auth:
    # Max requests per minute per IP on /api/auth/* (challenge + poll).
    # Protects against brute-force login attempts.
    requests-per-minute: 8

  api:
    # Max requests per minute per authenticated user on all /api/* routes.
    requests-per-minute: 300

  execute:
    # Tighter limit for POST /api/execute (console command dispatch).
    # Applied in addition to the api limit above — whichever trips first wins.
    requests-per-minute: 30

# ── Authentication ────────────────────────────────────────────────────────────
auth:
  # HMAC-256 JWT signing secret. Auto-generated on first start.
  # Changing this invalidates all existing browser sessions.
  jwt-secret: ""

  # Token lifetime in minutes. 0 = never expire.
  jwt-expiry-minutes: 1440

  # How long a /tty verify challenge UUID remains valid (seconds).
  challenge-ttl-seconds: 300

  # Require the verifying player to be an operator (/op).
  # Set false to allow any player with console access to authenticate.
  require-op: true

  # Security guard: block `tty verify ...` when the command was dispatched by
  # Teletype itself, such as from the web console, /api/execute, or snippets.
  # Leave enabled to prevent a browser session from approving its own login.
  disallow-teletype-verify: true

  # Security guard: block players from running `tty verify ...`, even when they
  # are operators. The real server console is still allowed.
  disallow-player-verify: true

  # If player verification is blocked, allow it only when the player's Minecraft
  # connection IP matches the HTTP connection that created the challenge.
  allow-player-verify-matching-ip: true

# ── Console interceptor ───────────────────────────────────────────────────────
console:
  # Set false to disable the live log stream and /ws/console endpoint entirely.
  enabled: true

  # Log lines replayed to a client that connects after the server has started.
  replay-buffer-lines: 1000

  # Truncate lines exceeding this many characters. 0 = unlimited.
  max-line-length: 2048

# ── Metrics collection ────────────────────────────────────────────────────────
metrics:
  # Set false to disable all metric collection and /glance/* endpoints.
  enabled: true

  # Sampling interval in server ticks. 20 ticks = 1 second = 1 Hz.
  # Higher values reduce overhead but coarsen chart resolution.
  sample-interval-ticks: 20

  # Seconds of 1-Hz samples kept in the JVM heap ring-buffer.
  # This is the maximum window serveable without hitting SQLite.
  in-memory-window-seconds: 900

  sqlite:
    # Set false to skip SQLite I/O; history beyond in-memory-window returns empty.
    enabled: true

    # How often the in-memory buffer is flushed to disk (seconds).
    flush-interval-seconds: 15

    retention:
      # Nightly downsampling job. Set false to keep all raw 1-Hz rows forever
      # (disk usage grows ~86 KB/day at 1 Hz).
      enabled: true

      # Compact 1-second rows to 1-minute averages for data older than N hours.
      downsample-1s-after-hours: 24

      # Compact 1-minute rows to 15-minute averages for data older than N days.
      downsample-1m-after-days: 7

      # Hard-delete 15-minute rows older than N days. 0 = keep forever.
      delete-15m-after-days: 90

# ── Actions / Snippets ────────────────────────────────────────────────────────
actions:
  # Set false to disable the actions subsystem and /actions/* endpoints.
  enabled: true

  # Allow snippets to be scheduled (cron / interval / once).
  scheduling-enabled: true

  # Category ID whose snippets appear in the console right-click Quick Actions menu.
  quick-actions-category-id: "quick-actions"

  # Hard caps to prevent abuse.
  max-snippets: 200
  max-scheduled-actions: 50

# ── File manager ──────────────────────────────────────────────────────────────
files:
  # Set false to disable the file browser and /files/* endpoints.
  enabled: true

  # Root directory exposed to the browser. Relative to server working directory.
  # Use an absolute path to lock it to a specific location.
  # ".." traversal is always blocked regardless of this setting.
  root: "."

  # Files larger than this (MB) are download-only; the Monaco editor won't open them.
  max-edit-size-mb: 4

  # Extensions allowed for in-browser text editing. Empty = all detected text files.
  # Example: ["yml", "json", "txt", "properties", "conf"]
  editable-extensions: []

# ── Profiling / Java Flight Recorder ─────────────────────────────────────────
# JFR is built into the JVM (JDK 9+) with no extra dependencies or commercial
# flags. It adds < 1% overhead on the default template; ~2-5% on profile.
profiling:
  # Master switch. Set false to disable all JFR recording and /profiling/* endpoints.
  enabled: true

  continuous:
    # Start an always-on rolling recording when the plugin loads.
    # Oldest data is evicted automatically when max-disk-mb or max-age-sec is reached.
    enabled: true

    # Maximum bytes kept on disk for the rolling buffer (MB).
    max-disk-mb: 256

    # Maximum age of events in the rolling buffer (seconds). 3600 = 1 hour.
    max-age-sec: 3600

    # JFR template: "default" (<1% overhead) or "profile" (~2-5%, richer data).
    # Use "profile" only for targeted diagnosis sessions, not permanently.
    template: "default"

    # Write a snapshot of the rolling buffer to disk when the JVM shuts down.
    # The file appears in the output-dir as "exit-dump.jfr".
    dump-on-exit: true

    # Directory for continuous dumps, relative to the plugin data folder.
    output-dir: "profiling/dumps"

  recordings:
    # Directory for manual (on-demand) recordings, relative to the plugin data folder.
    output-dir: "profiling/recordings"

    # Maximum total disk usage across all saved manual recordings (MB).
    # Oldest recordings are deleted automatically when the cap is exceeded.
    max-total-disk-mb: 512

# ── Glance thresholds ─────────────────────────────────────────────────────────
# Semantic color breakpoints for the dashboard status badge, stat card accents,
# and anomaly chart dots. Served via /api/glance/config so the frontend can
# read server-defined defaults (users can still override per-browser).
glance:
  tps:
    # TPS >= nominal-min  → green  (healthy)
    # TPS >= degraded-min → amber  (degraded)
    # TPS <  degraded-min → red    (incident)
    nominal-min: 19.0
    degraded-min: 15.0

  tick-time:
    # Tick <= nominal-max-ms  → green
    # Tick <= degraded-max-ms → amber
    # Tick >  degraded-max-ms → red
    nominal-max-ms: 50
    degraded-max-ms: 100

  memory:
    # Heap % <= nominal-max-pct  → blue (fine)
    # Heap % <= degraded-max-pct → amber (elevated)
    # Heap % >  degraded-max-pct → red  (critical)
    nominal-max-pct: 65
    degraded-max-pct: 85

  anomaly:
    # Z-score required to flag a data point as anomalous (chart dot + incident tooltip).
    # Raise these on noisy servers to reduce false positives.
    tps-sigma: 2.0
    tick-sigma: 2.0
    memory-sigma: 2.5

# ── Network routing ───────────────────────────────────────────────────────────
# Requires multiplex-game-port: true (above). Routes HTTP traffic arriving on the
# multiplexed port to internal services by URL path prefix. Minecraft connections
# are unaffected. Changes to these keys take effect after /tty reload or restart;
# routes themselves are managed live through the web panel (stored in routes.json).
network:
  # Master switch. Set false to disable path routing without removing saved routes.
  # Multiplexer still runs — HTTP falls through to Teletype, Minecraft still works.
  enabled: true

  # Hard cap on the number of routes that can be created through the panel.
  max-routes: 50

  # Hard cap on the number of port forwards that can be created through the panel.
  max-port-forwards: 20

  # Default connections-per-IP-per-minute for new routes created in the panel.
  # Each route can override this individually. The window resets every 60 seconds.
  # Set 0 to disable rate limiting on proxied routes entirely (not recommended).
  default-rate-limit-per-minute: 120
