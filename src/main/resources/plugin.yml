name: Teletype
version: '${version}'

main: io.github.Earth1283.teletype.Teletype
api-version: '1.21'
load: STARTUP
description: Minecraft web admin panel — console, players, files, metrics, and more.

authors: [ Earth1283 ]

commands:
  tty:
    description: Teletype web server control
    usage: /tty <verify|status|start|stop|reload|doctor>
    permission: teletype.admin
    aliases: ["teletype", "teletypewriter"]

permissions:
  teletype.admin:
    description: Full Teletype admin access
    default: op
