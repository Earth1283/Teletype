# Teletype Plugin Messages
# Format: MiniMessage — https://docs.advntr.dev/minimessage/format
# Available placeholders depend on the message; see comments on each key.
# {prefix} is always available and resolved from the prefix key below.
# To disable a message entirely, set it to an empty string: ""

prefix: "<bold><aqua>Teletype</aqua></bold> <dark_gray>»</dark_gray> "

# ── Lifecycle (console-only) ─────────────────────────────────────────────────
# {version} {url}
startup: "{prefix}<green>v{version} ready <dark_gray>—</dark_gray> <white>{url}"
# (no placeholders)
shutdown: "{prefix}<yellow>stopped"

# ── /tty command ─────────────────────────────────────────────────────────────
command:
  usage: "{prefix}<yellow>Usage: <gray>/tty [verify|status|start|stop|reload|doctor]"
  unknown-subcommand: "{prefix}<red>Unknown subcommand. <dark_gray>Usage: <gray>/tty [verify|status|start|stop|reload|doctor]"
  no-permission: "{prefix}<red>No permission."

  verify:
    no-permission: "{prefix}<red>Only operators or console can verify challenges."
    teletype-denied: "{prefix}<red>For security, <white>/tty verify</white><red> cannot be run from Teletype. Use the real server console or an operator in-game."
    player-denied: "{prefix}<red>For security, players cannot run <white>/tty verify</white><red>. Use the real server console."
    # {player_ip} {http_ip}
    player-ip-mismatch: "{prefix}<red>For security, player verify requires matching IPs. <gray>Player: <white>{player_ip}</white> <dark_gray>|</dark_gray> HTTP: <white>{http_ip}</white>"
    usage: "{prefix}<red>Usage: <gray>/tty verify [uuid]"
    invalid-uuid: "{prefix}<red>Invalid UUID format."
    # (no placeholders)
    success: "{prefix}<green>Challenge verified. JWT issued to the waiting client."
    # (no placeholders)
    not-found: "{prefix}<red>Challenge not found or already expired."

  status:
    # {port}
    running: "{prefix}<green>Web server running on port <white>{port}"
    stopped: "{prefix}<red>Web server is stopped."

  start:
    already-running: "{prefix}<yellow>Web server is already running."
    progress: "{prefix}<gray>Starting web server..."
    success: "{prefix}<green>Web server started."
    # {error}
    failed: "{prefix}<red>Failed to start web server: <white>{error}"

  stop:
    not-running: "{prefix}<yellow>Web server is not running."
    progress: "{prefix}<gray>Stopping web server..."
    success: "{prefix}<yellow>Web server stopped."
    # {error}
    failed: "{prefix}<red>Failed to stop web server: <white>{error}"

  reload:
    progress: "{prefix}<gray>Reloading configuration..."
    # {state}
    success: "{prefix}<green>Configuration reloaded; <white>{state}<green>. <gray>Startup-only subsystem changes require a full server restart."
    # {error}
    failed: "{prefix}<red>Reload failed: <white>{error}"

# ── TLS (console-only) ───────────────────────────────────────────────────────
tls:
  # {path}
  generating: "{prefix}<gray>Generating self-signed certificate <dark_gray>→</dark_gray> <white>{path}"
  cert-created: "{prefix}<gray>Self-signed cert created. <yellow>Browsers will warn — accept once."
  production-hint: "{prefix}<gray>For production, use <white>server.tls.mode: keystore</white> in config.yml"

# ── Metrics retention (console-only) ─────────────────────────────────────────
metrics:
  retention-start: "{prefix}<gray>Running nightly metrics retention…"
  retention-done: "{prefix}<gray>Metrics retention complete."
  # {error}
  retention-failed: "{prefix}<red>Retention job failed: <white>{error}"

# ── Web server (console-only) ─────────────────────────────────────────────────
web:
  # {error}
  error: "{prefix}<red>Unhandled exception: <white>{error}"

# ── Data file errors (console-only) ──────────────────────────────────────────
data:
  # {error}
  snippets-load-failed: "{prefix}<red>Failed to load snippets.json: <white>{error}<red>. Seeding defaults."
  # {error}
  schedule-load-failed: "{prefix}<red>Failed to load schedule.json: <white>{error}"
